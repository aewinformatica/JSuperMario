<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Super Mario World</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Courier New', monospace;
    overflow: hidden;
  }
  #gameContainer {
    position: relative;
  }
  canvas {
    display: block;
    image-rendering: pixelated;
  }
  #ui {
    position: absolute;
    top: 0; left: 0; right: 0;
    display: flex;
    justify-content: space-between;
    padding: 8px 16px;
    color: #fff;
    font-size: 16px;
    font-weight: bold;
    text-shadow: 2px 2px 0 #000;
    pointer-events: none;
    background: rgba(0,0,0,0.3);
  }
  #overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: rgba(0,0,0,0.75);
    color: #fff;
    text-align: center;
    display: none;
  }
  #overlay h1 {
    font-size: 48px;
    margin-bottom: 16px;
    text-shadow: 3px 3px 0 #c00;
  }
  #overlay.win h1 { text-shadow: 3px 3px 0 #f90; }
  #overlay p { font-size: 22px; margin-bottom: 24px; }
  #overlay button {
    font-family: 'Courier New', monospace;
    font-size: 20px;
    font-weight: bold;
    padding: 12px 32px;
    background: #e52;
    color: #fff;
    border: 4px solid #fff;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 2px;
    transition: background 0.15s;
  }
  #overlay button:hover { background: #f63; }
  #overlay.win button { background: #390; }
  #overlay.win button:hover { background: #4b0; }
</style>
</head>
<body>
<div id="gameContainer">
  <canvas id="gameCanvas"></canvas>
  <div id="ui">
    <span id="livesDisplay">LIVES: 3</span>
    <span id="scoreDisplay">SCORE: 0</span>
    <span id="coinsDisplay">COINS: 0</span>
  </div>
  <div id="overlay">
    <h1 id="overlayTitle">GAME OVER</h1>
    <p id="overlayMsg">Better luck next time!</p>
    <button id="restartBtn">Play Again</button>
  </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const W = 800, H = 480;
canvas.width = W;
canvas.height = H;

// ── Constants ──────────────────────────────────────────────
const GRAVITY   = 0.55;
const JUMP_V    = -13;
const MOVE_SPD  = 3.5;
const TILE      = 32;
const GROUND_Y  = H - TILE; // y where ground top sits

// ── Input ──────────────────────────────────────────────────
const keys = {};
document.addEventListener('keydown', e => { keys[e.code] = true; });
document.addEventListener('keyup',   e => { keys[e.code] = false; });

// ── Game state ─────────────────────────────────────────────
let score = 0, coins = 0, lives = 3;
let cameraX = 0;
let gameState = 'playing'; // playing | dead | gameover | win

// ── Level layout ───────────────────────────────────────────
const LEVEL_W = 6400; // total level width in pixels

// Platforms: {x, y, w, h, type}  type: 'ground'|'platform'|'qblock'|'brick'
const platforms = [];
const qblocks   = [];
const bricks    = [];

// Ground segments (gaps create pits)
const groundSegs = [
  {x:0,      w:1600},
  {x:1760,   w:960},
  {x:2880,   w:640},
  {x:3680,   w:960},
  {x:4800,   w:1600},
];
groundSegs.forEach(g => {
  platforms.push({x:g.x, y:GROUND_Y, w:g.w, h:TILE, type:'ground'});
});

// Floating platforms
const floaters = [
  // early game
  {x:320,  y:GROUND_Y-96,  w:96},
  {x:480,  y:GROUND_Y-128, w:96},
  {x:640,  y:GROUND_Y-96,  w:128},
  // over first gap
  {x:1632, y:GROUND_Y-64,  w:160},
  {x:1760, y:GROUND_Y-128, w:128},
  // mid
  {x:2100, y:GROUND_Y-96,  w:128},
  {x:2300, y:GROUND_Y-160, w:96},
  {x:2500, y:GROUND_Y-96,  w:160},
  // second gap area
  {x:2816, y:GROUND_Y-64,  w:96},
  {x:2948, y:GROUND_Y-128, w:96},
  {x:3100, y:GROUND_Y-64,  w:128},
  // stairs-like
  {x:3700, y:GROUND_Y-64,  w:64},
  {x:3780, y:GROUND_Y-128, w:64},
  {x:3860, y:GROUND_Y-192, w:64},
  {x:3940, y:GROUND_Y-256, w:64},
  {x:4020, y:GROUND_Y-192, w:64},
  {x:4100, y:GROUND_Y-128, w:64},
  // late
  {x:4860, y:GROUND_Y-128, w:160},
  {x:5100, y:GROUND_Y-96,  w:128},
  {x:5300, y:GROUND_Y-160, w:96},
  {x:5500, y:GROUND_Y-96,  w:192},
  {x:5760, y:GROUND_Y-128, w:128},
  {x:5960, y:GROUND_Y-64,  w:160},
];
floaters.forEach(f => {
  platforms.push({x:f.x, y:f.y, w:f.w, h:TILE, type:'platform'});
});

// Question blocks
const qblockDefs = [
  {x:352,  y:GROUND_Y-160},
  {x:512,  y:GROUND_Y-160},
  {x:672,  y:GROUND_Y-160},
  {x:1120, y:GROUND_Y-160},
  {x:1280, y:GROUND_Y-160},
  {x:2144, y:GROUND_Y-224},
  {x:2336, y:GROUND_Y-224},
  {x:3200, y:GROUND_Y-160},
  {x:3360, y:GROUND_Y-160},
  {x:4900, y:GROUND_Y-224},
  {x:5140, y:GROUND_Y-224},
  {x:5540, y:GROUND_Y-224},
];
qblockDefs.forEach(q => {
  qblocks.push({x:q.x, y:q.y, w:TILE, h:TILE, hit:false, animT:0});
});

// Brick blocks
const brickDefs = [
  {x:384,  y:GROUND_Y-160},
  {x:416,  y:GROUND_Y-160},
  {x:448,  y:GROUND_Y-160},
  {x:1152, y:GROUND_Y-160},
  {x:1184, y:GROUND_Y-160},
  {x:2272, y:GROUND_Y-224},
  {x:2304, y:GROUND_Y-224},
  {x:3232, y:GROUND_Y-160},
  {x:3264, y:GROUND_Y-160},
  {x:3296, y:GROUND_Y-160},
  {x:5060, y:GROUND_Y-224},
  {x:5092, y:GROUND_Y-224},
];
brickDefs.forEach(b => {
  bricks.push({x:b.x, y:b.y, w:TILE, h:TILE, alive:true});
});

// ── Coins ──────────────────────────────────────────────────
const coinItems = [];
[480,640,800,960,1120,1440,1800,2080,2240,2560,2720,3040,3360,3520,3840,4000,4160,4480,4640,4960,5120,5440,5600,5760,5920].forEach((x,i) => {
  coinItems.push({x, y: GROUND_Y - 96 - (i%3)*32, r:10, alive:true, animT:0});
});

// ── Enemies ────────────────────────────────────────────────
const enemies = [];
const enemyDefs = [
  {x:500},  {x:700},  {x:900},
  {x:1820}, {x:2000}, {x:2200},
  {x:2950}, {x:3100}, {x:3300},
  {x:3730}, {x:4000}, {x:4200},
  {x:4860}, {x:5000}, {x:5200},
  {x:5400}, {x:5600}, {x:5800},
];
enemyDefs.forEach(e => {
  enemies.push({
    x: e.x, y: GROUND_Y - TILE,
    w: 28, h: 28,
    vx: -1.2, vy: 0,
    alive: true, stomped: false, stompT: 0,
  });
});

// ── Flag ───────────────────────────────────────────────────
const flag = {x: LEVEL_W - 192, y: GROUND_Y - 320, w: 16, h: 320, reached: false};

// ── Particles ──────────────────────────────────────────────
const particles = [];
function spawnParticles(x, y, color, n=6) {
  for (let i = 0; i < n; i++) {
    particles.push({
      x, y,
      vx: (Math.random()-0.5)*5,
      vy: Math.random()*-5-2,
      life: 1, color,
    });
  }
}

// ── Floating score texts ────────────────────────────────────
const floatTexts = [];
function spawnText(x, y, text, color='#fff') {
  floatTexts.push({x, y, text, color, life:1.2, vy:-1.5});
}

// ── Clouds ─────────────────────────────────────────────────
const clouds = [];
for (let i = 0; i < 30; i++) {
  clouds.push({
    x: Math.random() * LEVEL_W,
    y: 20 + Math.random() * 120,
    w: 80 + Math.random() * 120,
    speed: 0.1 + Math.random() * 0.2,
  });
}

// ── Mario ──────────────────────────────────────────────────
const mario = {
  x: 80, y: GROUND_Y - 48,
  w: 28, h: 48,
  vx: 0, vy: 0,
  onGround: false,
  facing: 1, // 1 = right, -1 = left
  animFrame: 0, animT: 0,
  invincible: 0, // frames of invincibility after hit
  dead: false,
  deathT: 0,
};

// ── Helpers ────────────────────────────────────────────────
function rectOverlap(a, b) {
  return a.x < b.x+b.w && a.x+a.w > b.x &&
         a.y < b.y+b.h && a.y+a.h > b.y;
}

function allSolids() {
  const s = [...platforms];
  qblocks.forEach(q => { s.push(q); });
  bricks.forEach(b => { if(b.alive) s.push(b); });
  return s;
}

// ── Drawing functions ──────────────────────────────────────

function drawBackground() {
  // Sky gradient
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#4EC0F4');
  grad.addColorStop(1, '#84D8FF');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);
}

function drawClouds() {
  clouds.forEach(c => {
    const sx = c.x - cameraX;
    if (sx > -c.w-20 && sx < W+20) {
      drawCloud(sx, c.y, c.w);
    }
  });
}

function drawCloud(x, y, w) {
  ctx.fillStyle = '#fff';
  const h = w * 0.35;
  // Main body
  ctx.beginPath();
  ctx.ellipse(x + w*0.5, y + h, w*0.5, h*0.6, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(x + w*0.3, y + h*0.5, w*0.3, h*0.7, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(x + w*0.7, y + h*0.6, w*0.25, h*0.6, 0, 0, Math.PI*2);
  ctx.fill();
  // Outline tint
  ctx.fillStyle = 'rgba(200,230,255,0.4)';
  ctx.beginPath();
  ctx.ellipse(x + w*0.5, y + h, w*0.5, h*0.6, 0, 0, Math.PI*2);
  ctx.fill();
}

function drawGround() {
  platforms.forEach(p => {
    if (p.type !== 'ground') return;
    const sx = p.x - cameraX;
    if (sx + p.w < 0 || sx > W) return;

    // Dirt base
    ctx.fillStyle = '#8B5E3C';
    ctx.fillRect(sx, p.y + TILE*0.3, p.w, TILE*0.7);

    // Grass top
    ctx.fillStyle = '#4CAF50';
    ctx.fillRect(sx, p.y, p.w, TILE*0.35);

    // Darker grass strip
    ctx.fillStyle = '#388E3C';
    ctx.fillRect(sx, p.y + TILE*0.3, p.w, 4);

    // Grass tufts
    ctx.fillStyle = '#66BB6A';
    for (let gx = sx+4; gx < sx+p.w-4; gx += 16) {
      ctx.fillRect(gx, p.y, 4, 6);
      ctx.fillRect(gx+6, p.y-2, 4, 8);
    }

    // Dirt texture
    ctx.fillStyle = '#7A5230';
    for (let dx = sx+8; dx < sx+p.w-8; dx+=32) {
      ctx.fillRect(dx, p.y+16, 8, 4);
      ctx.fillRect(dx+16, p.y+28, 6, 3);
    }
  });
}

function drawPlatforms() {
  platforms.forEach(p => {
    if (p.type !== 'platform') return;
    const sx = p.x - cameraX;
    if (sx + p.w < 0 || sx > W) return;
    // Platform top
    ctx.fillStyle = '#795548';
    ctx.fillRect(sx, p.y, p.w, TILE);
    ctx.fillStyle = '#A1887F';
    ctx.fillRect(sx, p.y, p.w, 6);
    ctx.fillStyle = '#4E342E';
    ctx.fillRect(sx, p.y+TILE-3, p.w, 3);
    // Tile lines
    ctx.fillStyle = '#6D4C41';
    for (let tx = sx; tx < sx+p.w; tx += TILE) {
      ctx.fillRect(tx, p.y, 1, TILE);
    }
  });
}

function drawQBlocks() {
  qblocks.forEach(q => {
    const sx = q.x - cameraX;
    if (sx + q.w < 0 || sx > W) return;
    const offY = q.animT > 0 ? -Math.sin(q.animT * Math.PI) * 8 : 0;

    if (q.hit) {
      // Used block - gray
      ctx.fillStyle = '#9E9E9E';
      ctx.fillRect(sx, q.y + offY, q.w, q.h);
      ctx.fillStyle = '#757575';
      ctx.fillRect(sx+2, q.y+2+offY, q.w-4, q.h-4);
      ctx.fillStyle = '#BDBDBD';
      ctx.fillRect(sx, q.y+offY, q.w, 4);
      ctx.fillRect(sx, q.y+offY, 4, q.h);
    } else {
      // Glowing yellow block
      ctx.fillStyle = '#F9A825';
      ctx.fillRect(sx, q.y+offY, q.w, q.h);
      ctx.fillStyle = '#FFD54F';
      ctx.fillRect(sx+2, q.y+2+offY, q.w-4, q.h-4);
      ctx.fillStyle = '#FFEE58';
      ctx.fillRect(sx+4, q.y+4+offY, q.w-8, 6);
      // "?" mark
      ctx.fillStyle = '#E65100';
      ctx.font = 'bold 18px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('?', sx + q.w/2, q.y + q.h*0.72 + offY);
      // Border
      ctx.fillStyle = '#E65100';
      ctx.fillRect(sx, q.y+offY, q.w, 3);
      ctx.fillRect(sx, q.y+q.h-3+offY, q.w, 3);
      ctx.fillRect(sx, q.y+offY, 3, q.h);
      ctx.fillRect(sx+q.w-3, q.y+offY, 3, q.h);
    }
  });
}

function drawBricks() {
  bricks.forEach(b => {
    if (!b.alive) return;
    const sx = b.x - cameraX;
    if (sx + b.w < 0 || sx > W) return;
    ctx.fillStyle = '#C62828';
    ctx.fillRect(sx, b.y, b.w, b.h);
    ctx.fillStyle = '#E57373';
    ctx.fillRect(sx+1, b.y+1, b.w/2-2, b.h/2-2);
    ctx.fillRect(sx+b.w/2+1, b.y+b.h/2+1, b.w/2-2, b.h/2-2);
    ctx.fillStyle = '#B71C1C';
    ctx.fillRect(sx+b.w/2, b.y, 2, b.h);
    ctx.fillRect(sx, b.y+b.h/2, b.w, 2);
    ctx.fillStyle = '#FFCDD2';
    ctx.fillRect(sx+2, b.y+2, 6, 4);
  });
}

function drawCoins() {
  coinItems.forEach(c => {
    if (!c.alive) return;
    const sx = c.x - cameraX;
    if (sx < -20 || sx > W+20) return;
    c.animT += 0.05;
    const bob = Math.sin(c.animT) * 4;
    // Coin glow
    ctx.shadowColor = '#FFD700';
    ctx.shadowBlur = 8;
    ctx.fillStyle = '#FFD700';
    ctx.beginPath();
    ctx.ellipse(sx, c.y + bob, c.r * Math.abs(Math.cos(c.animT*0.7)) + 2, c.r, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#FFF176';
    ctx.beginPath();
    ctx.ellipse(sx - 2, c.y + bob - 2, (c.r-3) * Math.abs(Math.cos(c.animT*0.7)) + 1, c.r-3, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.shadowBlur = 0;
  });
}

function drawEnemies() {
  enemies.forEach(e => {
    if (!e.alive && !e.stomped) return;
    const sx = e.x - cameraX;
    if (sx < -40 || sx > W+40) return;

    if (e.stomped) {
      // Flattened goomba
      ctx.fillStyle = '#795548';
      ctx.fillRect(sx, e.y + e.h - 10, e.w, 10);
      ctx.fillStyle = '#4E342E';
      ctx.fillRect(sx+2, e.y + e.h - 8, e.w-4, 6);
      return;
    }

    // Body
    ctx.fillStyle = '#795548';
    ctx.fillRect(sx, e.y + e.h*0.35, e.w, e.h*0.65);

    // Head
    ctx.fillStyle = '#8D6E63';
    ctx.beginPath();
    ctx.arc(sx + e.w/2, e.y + e.h*0.35, e.w/2, 0, Math.PI*2);
    ctx.fill();

    // Angry eyebrows
    ctx.fillStyle = '#3E2723';
    ctx.fillRect(sx+3, e.y+5, 8, 3);
    ctx.fillRect(sx+e.w-11, e.y+5, 8, 3);

    // Eyes
    ctx.fillStyle = '#fff';
    ctx.fillRect(sx+4, e.y+9, 7, 6);
    ctx.fillRect(sx+e.w-11, e.y+9, 7, 6);
    ctx.fillStyle = '#000';
    ctx.fillRect(sx+6, e.y+10, 4, 4);
    ctx.fillRect(sx+e.w-9, e.y+10, 4, 4);

    // Feet
    const step = Math.floor(e.x/16) % 2 === 0;
    ctx.fillStyle = '#4E342E';
    ctx.fillRect(sx+1, e.y+e.h-6, 10, 6);
    ctx.fillRect(sx+e.w-11, e.y+e.h-6, 10, 6);
    if (step) {
      ctx.fillRect(sx-2, e.y+e.h-8, 10, 6);
    } else {
      ctx.fillRect(sx+e.w-8, e.y+e.h-8, 10, 6);
    }
  });
}

function drawMario() {
  if (mario.dead) return;
  const alpha = mario.invincible > 0 ? (Math.floor(mario.invincible / 4) % 2 === 0 ? 0.3 : 1) : 1;
  ctx.globalAlpha = alpha;

  const sx = mario.x - cameraX;
  const sy = mario.y;
  const f = mario.facing; // 1=right, -1=left

  ctx.save();
  if (f === -1) {
    ctx.translate(sx + mario.w, sy);
    ctx.scale(-1, 1);
    drawMarioSprite(0, 0, mario.animFrame, mario.onGround, mario.vy);
  } else {
    ctx.translate(sx, sy);
    drawMarioSprite(0, 0, mario.animFrame, mario.onGround, mario.vy);
  }
  ctx.restore();
  ctx.globalAlpha = 1;
}

function drawMarioSprite(ox, oy, frame, onGround, vy) {
  const w = mario.w, h = mario.h;

  // Hat (red)
  ctx.fillStyle = '#D32F2F';
  ctx.fillRect(ox+2, oy, w-4, 10);
  ctx.fillRect(ox, oy+4, w, 6);

  // Brim shadow
  ctx.fillStyle = '#B71C1C';
  ctx.fillRect(ox, oy+8, w, 3);

  // Face (skin)
  ctx.fillStyle = '#FFCC80';
  ctx.fillRect(ox+2, oy+10, w-4, 12);

  // Eyes
  ctx.fillStyle = '#000';
  ctx.fillRect(ox+w-10, oy+12, 5, 4);

  // Mustache
  ctx.fillStyle = '#4E342E';
  ctx.fillRect(ox+4, oy+18, w-6, 4);

  // Nose
  ctx.fillStyle = '#FF8A65';
  ctx.fillRect(ox+w-13, oy+15, 7, 4);

  // Overalls (blue)
  ctx.fillStyle = '#1565C0';
  ctx.fillRect(ox+2, oy+22, w-4, 14);

  // Shirt buttons area (red)
  ctx.fillStyle = '#D32F2F';
  ctx.fillRect(ox+2, oy+22, 6, 14);
  ctx.fillRect(ox+w-8, oy+22, 6, 14);

  // Overalls straps
  ctx.fillStyle = '#1565C0';
  ctx.fillRect(ox+7, oy+16, 5, 8);
  ctx.fillRect(ox+w-12, oy+16, 5, 8);

  // Pants (blue)
  ctx.fillStyle = '#1565C0';
  ctx.fillRect(ox+2, oy+36, w-4, 8);

  // Legs/shoes
  const legOff = onGround ? (vy === 0 ? Math.sin(frame*0.5)*3 : 0) : 0;
  ctx.fillStyle = '#1565C0';
  ctx.fillRect(ox+2, oy+h-14, (w-6)/2, 8);
  ctx.fillRect(ox+(w-6)/2+5, oy+h-14, (w-6)/2, 8);

  // Shoes (brown)
  ctx.fillStyle = '#4E342E';
  ctx.fillRect(ox+1, oy+h-8, (w-4)/2+1, 8);
  ctx.fillRect(ox+(w-4)/2+2, oy+h-8, (w-4)/2+1, 8);

  // Jump pose - raise arms
  if (!onGround) {
    ctx.fillStyle = '#FFCC80';
    ctx.fillRect(ox-4, oy+18, 6, 10);
    ctx.fillRect(ox+w-2, oy+18, 6, 10);
    // Gloves
    ctx.fillStyle = '#fff';
    ctx.fillRect(ox-5, oy+26, 7, 7);
    ctx.fillRect(ox+w-2, oy+26, 7, 7);
  } else {
    // Arms down/swing
    ctx.fillStyle = '#FFCC80';
    const armOff = Math.sin(frame * 0.5) * 4;
    ctx.fillRect(ox-4, oy+22+armOff, 6, 10);
    ctx.fillRect(ox+w-2, oy+22-armOff, 6, 10);
    ctx.fillStyle = '#fff';
    ctx.fillRect(ox-5, oy+30+armOff, 7, 7);
    ctx.fillRect(ox+w-2, oy+30-armOff, 7, 7);
  }
}

function drawFlag() {
  const sx = flag.x - cameraX;
  if (sx < -50 || sx > W+50) return;

  // Pole
  ctx.fillStyle = '#9E9E9E';
  ctx.fillRect(sx + 8, flag.y, 6, flag.h);
  ctx.fillStyle = '#BDBDBD';
  ctx.fillRect(sx + 8, flag.y, 3, flag.h);

  // Ball on top
  ctx.fillStyle = '#FFD700';
  ctx.beginPath();
  ctx.arc(sx+11, flag.y, 8, 0, Math.PI*2);
  ctx.fill();

  // Flag cloth
  const waveOff = Math.sin(Date.now()*0.005) * 5;
  ctx.fillStyle = '#4CAF50';
  ctx.beginPath();
  ctx.moveTo(sx+14, flag.y+4);
  ctx.lineTo(sx+14+50+waveOff, flag.y+20);
  ctx.lineTo(sx+14, flag.y+40);
  ctx.closePath();
  ctx.fill();
  ctx.fillStyle = '#388E3C';
  ctx.beginPath();
  ctx.moveTo(sx+14, flag.y+4);
  ctx.lineTo(sx+14+50+waveOff, flag.y+20);
  ctx.lineTo(sx+14+50+waveOff, flag.y+22);
  ctx.lineTo(sx+14, flag.y+6);
  ctx.closePath();
  ctx.fill();

  // Castle at end
  drawCastle(sx + 80, GROUND_Y - 160);
}

function drawCastle(sx, sy) {
  if (sx > W+200) return;
  // Main body
  ctx.fillStyle = '#BDBDBD';
  ctx.fillRect(sx, sy, 128, 160);

  // Battlements
  ctx.fillStyle = '#9E9E9E';
  for (let i = 0; i < 5; i++) {
    ctx.fillRect(sx + i*28, sy-24, 18, 24);
  }

  // Gate
  ctx.fillStyle = '#212121';
  ctx.fillRect(sx+44, sy+96, 40, 64);
  ctx.beginPath();
  ctx.arc(sx+64, sy+96, 20, Math.PI, 0);
  ctx.fill();

  // Windows
  ctx.fillStyle = '#212121';
  ctx.fillRect(sx+16, sy+40, 20, 24);
  ctx.fillRect(sx+92, sy+40, 20, 24);

  // Flag on castle
  ctx.fillStyle = '#EF5350';
  ctx.fillRect(sx+60, sy-56, 4, 32);
  ctx.beginPath();
  ctx.moveTo(sx+64, sy-56);
  ctx.lineTo(sx+84, sy-44);
  ctx.lineTo(sx+64, sy-32);
  ctx.fill();
}

function drawParticles() {
  particles.forEach(p => {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - cameraX - 3, p.y - 3, 6, 6);
  });
  ctx.globalAlpha = 1;
}

function drawFloatTexts() {
  floatTexts.forEach(t => {
    ctx.globalAlpha = Math.min(1, t.life);
    ctx.fillStyle = t.color;
    ctx.font = 'bold 16px monospace';
    ctx.textAlign = 'center';
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 3;
    ctx.strokeText(t.text, t.x - cameraX, t.y);
    ctx.fillText(t.text, t.x - cameraX, t.y);
  });
  ctx.globalAlpha = 1;
}

function drawHills() {
  // Decorative background hills
  ctx.fillStyle = '#66BB6A';
  [200, 700, 1300, 1900, 2600, 3200, 3800, 4400, 5000, 5600].forEach(hx => {
    const sx = hx - cameraX * 0.5; // parallax
    ctx.beginPath();
    ctx.arc(sx, GROUND_Y, 120, Math.PI, 0);
    ctx.fill();
    ctx.fillStyle = '#4CAF50';
    ctx.beginPath();
    ctx.arc(sx+80, GROUND_Y, 80, Math.PI, 0);
    ctx.fill();
    ctx.fillStyle = '#66BB6A';
  });
}

// ── Physics & Update ───────────────────────────────────────

function updateMario(dt) {
  if (mario.dead) {
    mario.deathT++;
    mario.vy += GRAVITY;
    mario.y += mario.vy;
    if (mario.deathT > 90) {
      loseLife();
    }
    return;
  }

  if (mario.invincible > 0) mario.invincible--;

  // Horizontal
  let moving = false;
  if (keys['ArrowLeft'] || keys['KeyA']) {
    mario.vx = -MOVE_SPD;
    mario.facing = -1;
    moving = true;
  } else if (keys['ArrowRight'] || keys['KeyD']) {
    mario.vx = MOVE_SPD;
    mario.facing = 1;
    moving = true;
  } else {
    mario.vx *= 0.8;
    if (Math.abs(mario.vx) < 0.1) mario.vx = 0;
  }

  // Jump
  if ((keys['Space'] || keys['ArrowUp'] || keys['KeyW']) && mario.onGround) {
    mario.vy = JUMP_V;
    mario.onGround = false;
  }

  // Animation
  if (moving && mario.onGround) {
    mario.animT += 0.25;
    mario.animFrame = Math.floor(mario.animT) % 4;
  } else if (!mario.onGround) {
    mario.animFrame = 2;
  } else {
    mario.animFrame = 0;
    mario.animT = 0;
  }

  // Gravity
  mario.vy += GRAVITY;
  if (mario.vy > 18) mario.vy = 18;

  // Move X
  mario.x += mario.vx;

  // Clamp left
  if (mario.x < 0) mario.x = 0;

  // Collide X with solids
  const solids = allSolids();
  solids.forEach(p => {
    if (rectOverlap({x:mario.x, y:mario.y+4, w:mario.w, h:mario.h-8}, p)) {
      if (mario.vx > 0) mario.x = p.x - mario.w;
      else if (mario.vx < 0) mario.x = p.x + p.w;
      mario.vx = 0;
    }
  });

  // Move Y
  mario.y += mario.vy;
  mario.onGround = false;

  // Collide Y with solids
  solids.forEach(p => {
    if (rectOverlap({x:mario.x+2, y:mario.y, w:mario.w-4, h:mario.h}, p)) {
      if (mario.vy > 0) {
        // Landing
        mario.y = p.y - mario.h;
        mario.vy = 0;
        mario.onGround = true;
      } else if (mario.vy < 0) {
        // Hit ceiling
        mario.y = p.y + p.h;
        mario.vy = 1;
        hitBlock(p);
      }
    }
  });

  // Fall into pit
  if (mario.y > H + 100) {
    killMario();
    return;
  }

  // Camera
  const targetCam = mario.x - W/3;
  cameraX += (targetCam - cameraX) * 0.12;
  if (cameraX < 0) cameraX = 0;
  if (cameraX > LEVEL_W - W) cameraX = LEVEL_W - W;

  // Collect coins
  coinItems.forEach(c => {
    if (!c.alive) return;
    if (Math.abs(mario.x + mario.w/2 - c.x) < 22 && Math.abs(mario.y + mario.h/2 - c.y) < 22) {
      c.alive = false;
      coins++;
      score += 100;
      spawnParticles(c.x, c.y, '#FFD700', 8);
      spawnText(c.x, c.y - 20, '+100', '#FFD700');
      updateUI();
    }
  });

  // Flag collision
  if (!flag.reached) {
    const flagRect = {x: flag.x, y: flag.y, w: 60, h: flag.h};
    if (rectOverlap({x:mario.x, y:mario.y, w:mario.w, h:mario.h}, flagRect)) {
      flag.reached = true;
      score += 5000;
      updateUI();
      setTimeout(() => showOverlay('win'), 1000);
    }
  }
}

function hitBlock(block) {
  // Check if it's a qblock
  const q = qblocks.find(q => q === block);
  if (q && !q.hit) {
    q.hit = true;
    q.animT = 1;
    coins++;
    score += 200;
    spawnParticles(q.x + q.w/2, q.y, '#FFD700', 10);
    spawnText(q.x + q.w/2, q.y - 30, '+200', '#FFD700');
    updateUI();
    return;
  }

  // Check if it's a brick
  const b = bricks.find(b => b === block);
  if (b && b.alive) {
    b.alive = false;
    score += 50;
    spawnParticles(b.x + b.w/2, b.y, '#C62828', 8);
    spawnText(b.x + b.w/2, b.y - 30, '+50', '#FF8A65');
    updateUI();
  }
}

function updateEnemies() {
  enemies.forEach(e => {
    if (!e.alive) {
      if (e.stomped) {
        e.stompT++;
        if (e.stompT > 45) e.alive = false; // disappear after stomp anim
      }
      return;
    }

    e.vy += GRAVITY;
    e.x += e.vx;
    e.y += e.vy;

    // Ground/platform collisions
    const solids = allSolids();
    let onGround = false;
    solids.forEach(p => {
      if (rectOverlap({x:e.x+2, y:e.y, w:e.w-4, h:e.h}, p)) {
        if (e.vy >= 0 && e.y + e.h - e.vy <= p.y + 4) {
          e.y = p.y - e.h;
          e.vy = 0;
          onGround = true;
        } else if (e.vy < 0) {
          e.y = p.y + p.h;
          e.vy = 0;
        } else {
          // Side collision
          e.vx *= -1;
        }
      }
    });

    // Reverse at edges
    if (onGround) {
      let edgeL = false, edgeR = false;
      const step = 4;
      const edgeCheckL = {x:e.x-step, y:e.y+e.h, w:step, h:4};
      const edgeCheckR = {x:e.x+e.w, y:e.y+e.h, w:step, h:4};
      solids.forEach(p => {
        if (rectOverlap(edgeCheckL, p)) edgeL = true;
        if (rectOverlap(edgeCheckR, p)) edgeR = true;
      });
      if (e.vx < 0 && !edgeL) e.vx = Math.abs(e.vx);
      if (e.vx > 0 && !edgeR) e.vx = -Math.abs(e.vx);
    }

    // Fall off screen
    if (e.y > H + 60) { e.alive = false; return; }

    // Clamp in level
    if (e.x < 0) { e.x = 0; e.vx = Math.abs(e.vx); }
    if (e.x + e.w > LEVEL_W) { e.x = LEVEL_W - e.w; e.vx = -Math.abs(e.vx); }

    // Mario stomp check
    if (mario.dead || mario.invincible > 0) return;
    if (rectOverlap({x:mario.x+2, y:mario.y+2, w:mario.w-4, h:mario.h-4}, {x:e.x, y:e.y, w:e.w, h:e.h})) {
      // Mario landing on top = stomp
      if (mario.vy > 0 && mario.y + mario.h - mario.vy < e.y + 8) {
        e.alive = false;
        e.stomped = true;
        e.stompT = 0;
        mario.vy = -7;
        score += 200;
        spawnParticles(e.x+e.w/2, e.y, '#795548', 8);
        spawnText(e.x+e.w/2, e.y-30, '+200', '#FFCC80');
        updateUI();
      } else {
        // Mario gets hurt
        killMario();
      }
    }
  });
}

function updateParticles() {
  for (let i = particles.length-1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.2;
    p.life -= 0.04;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function updateFloatTexts() {
  for (let i = floatTexts.length-1; i >= 0; i--) {
    const t = floatTexts[i];
    t.y += t.vy;
    t.life -= 0.02;
    if (t.life <= 0) floatTexts.splice(i, 1);
  }
}

function updateQBlocks() {
  qblocks.forEach(q => {
    if (q.animT > 0) {
      q.animT -= 0.05;
      if (q.animT < 0) q.animT = 0;
    }
  });
}

function updateClouds() {
  clouds.forEach(c => {
    c.x += c.speed;
    if (c.x > LEVEL_W + c.w) c.x = -c.w;
  });
}

function killMario() {
  if (mario.dead || mario.invincible > 0) return;
  mario.dead = true;
  mario.vy = JUMP_V * 0.8;
  mario.deathT = 0;
}

function loseLife() {
  lives--;
  updateUI();
  if (lives <= 0) {
    gameState = 'gameover';
    showOverlay('gameover');
  } else {
    resetMario();
  }
}

function resetMario() {
  mario.x = 80; mario.y = GROUND_Y - 48;
  mario.vx = 0; mario.vy = 0;
  mario.onGround = false;
  mario.dead = false;
  mario.deathT = 0;
  mario.invincible = 120;
  mario.facing = 1;
  cameraX = 0;
  gameState = 'playing';
}

// ── UI ─────────────────────────────────────────────────────
function updateUI() {
  document.getElementById('livesDisplay').textContent = 'LIVES: ' + lives;
  document.getElementById('scoreDisplay').textContent = 'SCORE: ' + score;
  document.getElementById('coinsDisplay').textContent = 'COINS: ' + coins;
}

function showOverlay(type) {
  const overlay = document.getElementById('overlay');
  const title = document.getElementById('overlayTitle');
  const msg = document.getElementById('overlayMsg');
  overlay.className = type;
  overlay.style.display = 'flex';
  if (type === 'win') {
    title.textContent = 'YOU WIN!';
    msg.textContent = `Score: ${score}  Coins: ${coins}  Lives: ${lives}`;
    gameState = 'win';
  } else {
    title.textContent = 'GAME OVER';
    msg.textContent = 'Better luck next time!';
    gameState = 'gameover';
  }
}

function restartGame() {
  // Reset all state
  score = 0; coins = 0; lives = 3;
  cameraX = 0;
  gameState = 'playing';

  // Reset Mario
  mario.x = 80; mario.y = GROUND_Y - 48;
  mario.vx = 0; mario.vy = 0;
  mario.onGround = false;
  mario.dead = false;
  mario.deathT = 0;
  mario.invincible = 0;
  mario.facing = 1;
  mario.animFrame = 0; mario.animT = 0;

  // Reset enemies
  const origDefs = [
    {x:500},{x:700},{x:900},
    {x:1820},{x:2000},{x:2200},
    {x:2950},{x:3100},{x:3300},
    {x:3730},{x:4000},{x:4200},
    {x:4860},{x:5000},{x:5200},
    {x:5400},{x:5600},{x:5800},
  ];
  enemies.length = 0;
  origDefs.forEach(e => {
    enemies.push({
      x:e.x, y:GROUND_Y-TILE,
      w:28, h:28,
      vx:-1.2, vy:0,
      alive:true, stomped:false, stompT:0,
    });
  });

  // Reset coins
  coinItems.forEach(c => { c.alive = true; c.animT = 0; });

  // Reset qblocks
  qblocks.forEach(q => { q.hit = false; q.animT = 0; });

  // Reset bricks
  bricks.forEach(b => { b.alive = true; });

  // Reset flag
  flag.reached = false;

  // Clear particles and texts
  particles.length = 0;
  floatTexts.length = 0;

  document.getElementById('overlay').style.display = 'none';
  updateUI();
}

document.getElementById('restartBtn').addEventListener('click', restartGame);

// ── Main Loop ──────────────────────────────────────────────
let lastTime = 0;
function gameLoop(timestamp) {
  const dt = Math.min((timestamp - lastTime) / 16.67, 2);
  lastTime = timestamp;

  // Update
  if (gameState === 'playing' || gameState === 'dead') {
    updateMario(dt);
    updateEnemies();
    updateParticles();
    updateFloatTexts();
    updateQBlocks();
    updateClouds();
  }

  // Draw
  drawBackground();
  drawHills();
  drawClouds();
  drawGround();
  drawPlatforms();
  drawQBlocks();
  drawBricks();
  drawCoins();
  drawEnemies();
  drawFlag();
  drawMario();
  drawParticles();
  drawFloatTexts();

  requestAnimationFrame(gameLoop);
}

updateUI();
requestAnimationFrame(gameLoop);
</script>
